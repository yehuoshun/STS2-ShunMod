name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v0.1.0)'
        required: true
        type: string
      prerelease:
        description: '预发布版本'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x build.sh
          ./build.sh --ci

      - name: Package
        run: |
          mkdir -p publish/STS2-ShunMod
          cp STS2-ShunMod/bin/Release/net9.0/STS2-ShunMod.dll publish/STS2-ShunMod/
          cp STS2_ShunMod.json publish/STS2-ShunMod/
          cp STS2-ShunMod/bin/Release/net9.0/STS2-ShunMod.pck publish/STS2-ShunMod/ 2>/dev/null || echo "⚠️ 无 .pck"
          cd publish && zip -r ../STS2-ShunMod.zip STS2-ShunMod/
          unzip -l ../STS2-ShunMod.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: STS2-ShunMod
          path: STS2-ShunMod.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: STS2-ShunMod.zip
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: true
