name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v0.1.0)'
        required: true
        type: string
      prerelease:
        description: '预发布版本'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "PRERELEASE=${{ github.event.inputs.prerelease }}" >> $GITHUB_OUTPUT
            echo "TITLE=Release ${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "TITLE=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## 更新内容"
            echo ""
            if [ -n "$PREV" ]; then
              echo "自 $PREV 以来的更改："
              echo ""
              git log ${PREV}..HEAD --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --reverse
            else
              git log --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --reverse
            fi
            echo ""
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV:-HEAD}...${{ steps.vars.outputs.TAG }}"
          } > release_notes.md

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARGS="--repo \"${{ github.repository }}\" --title \"${{ steps.vars.outputs.TITLE }}\" --notes-file release_notes.md"
          [ "${{ steps.vars.outputs.PRERELEASE }}" = "true" ] && ARGS="$ARGS --prerelease"
          eval "gh release create \"${{ steps.vars.outputs.TAG }}\" $ARGS"
          echo "✅ Release ${{ steps.vars.outputs.TAG }} 创建成功"
