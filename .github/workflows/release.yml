name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v0.1.0)'
        required: true
        type: string
      prerelease:
        description: '预发布版本'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download game references
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p deps
          gh release download deps \
            --dir deps \
            --pattern "*.dll" \
            --repo "${{ github.repository }}" \
            --clobber 2>/dev/null || {
            echo ""
            echo "=============================================="
            echo "  缺少 CI 构建依赖！请在本地运行一次："
            echo "    ./build.sh --sync-deps"
            echo "=============================================="
            exit 1
          }
          ls -la deps/

      - name: Build & Export .pck
        run: |
          dotnet build -c Release -p:Sts2DataDir="$(realpath deps)"
          echo "=== 下载 Godot 4.5.1 Mono ==="
          GODOT_URL="https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_mono_linux_x86_64.zip"
          curl -sL "$GODOT_URL" -o godot.zip || { echo "❌ 下载失败，回退到资源目录"; exit 0; }
          unzip -q godot.zip -d godot 2>/dev/null
          GODOT=$(find godot -name "Godot*" -type f | head -1)
          [ -z "$GODOT" ] && { echo "❌ 未找到 Godot 可执行文件"; exit 0; }
          chmod +x "$GODOT"
          echo "=== 导出 .pck ==="
          "$GODOT" --headless --export-pack "BasicExport" STS2-ShunMod.pck
          ls -la STS2-ShunMod.pck 2>/dev/null || echo "⚠️ 导出失败"

      - name: Package
        run: |
          BUILD_DIR=.godot/mono/temp/bin/Release
          mkdir -p publish
          cp "$BUILD_DIR/STS2-ShunMod.dll" publish/
          cp STS2_ShunMod.json publish/
          PCK=$(find . -maxdepth 1 -name "STS2-ShunMod.pck" -type f 2>/dev/null | head -1)
          if [ -n "$PCK" ]; then
            cp "$PCK" publish/
          else
            echo "⚠️ 无 .pck"
          fi
          ls -la publish/
          cd publish && zip -r ../STS2-ShunMod.zip .

      - name: Set version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## 更新内容"
            echo ""
            if [ -n "$PREV" ]; then
              echo "自 $PREV 以来的更改："
              echo ""
              git log ${PREV}..HEAD --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --reverse
            else
              git log --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --reverse
            fi
          } > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          files: STS2-ShunMod.zip
          body_path: release_notes.md
          prerelease: ${{ github.event.inputs.prerelease || false }}
